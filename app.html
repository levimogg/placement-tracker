<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Placement Dashboard — Teach For America Washington</title>
  <script>if(sessionStorage.getItem('auth')!=='1')window.location.replace('index.html');</script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --blue: #76CEE1;
      --navy: #00225A;
      --red: #EF322D;
      --maroon: #4B0000;
      --cream: #FFEED4;
      --black: #110E05;
      --charcoal: #424039;
      --stone: #8B8A86;
      --white: #FFFFFF;
      --gray-50: #F7F8FA;
      --gray-100: #ECEEF2;
      --gray-200: #DDE1E8;
      --gray-300: #C5CAD4;
      --radius: 10px;
      --shadow-sm: 0 1px 3px rgba(0,34,90,0.06);
      --shadow-md: 0 4px 14px rgba(0,34,90,0.08);
      --shadow-lg: 0 8px 28px rgba(0,34,90,0.12);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Poppins', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--gray-50); color: var(--black); line-height: 1.55; }

    /* === HEADER === */
    .header { background: var(--navy); padding: 0 32px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; box-shadow: var(--shadow-lg); height: 60px; }
    .header-left { display: flex; align-items: center; gap: 20px; }
    .header-logo { height: 18px; opacity: 0.95; }
    .header-divider { width: 1px; height: 28px; background: rgba(255,238,212,0.2); }
    .header-title { color: var(--cream); font-size: 15px; font-weight: 600; letter-spacing: -0.3px; }
    .header-subtitle { color: var(--blue); font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 1px; }
    .header-right { display: flex; align-items: center; gap: 14px; }
    .header-meta { font-size: 11px; color: rgba(255,238,212,0.5); }
    .data-badge { padding: 3px 10px; border-radius: 20px; font-size: 10px; font-weight: 600; letter-spacing: 0.3px; }
    .data-badge.demo { background: rgba(239,50,45,0.15); color: #ff897e; }
    .data-badge.live { background: rgba(118,206,225,0.15); color: var(--blue); }

    /* === GOAL TRACKER === */
    .goal-tracker { background: var(--white); border-bottom: 1px solid var(--gray-200); padding: 20px 32px; display: flex; gap: 28px; align-items: stretch; }
    .goal-main { flex: 1; min-width: 0; }
    .goal-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: var(--stone); margin-bottom: 10px; }
    .goal-bar-outer { position: relative; background: var(--gray-100); border-radius: 8px; height: 28px; overflow: visible; margin-bottom: 6px; }
    .goal-bar-fill { height: 100%; border-radius: 8px; display: flex; align-items: center; justify-content: flex-end; padding-right: 10px; font-size: 12px; font-weight: 700; color: var(--white); transition: width 0.6s; position: relative; z-index: 2; }
    .goal-bar-fill.on-pace { background: linear-gradient(135deg, var(--blue), #5ab8cc); }
    .goal-bar-fill.behind { background: linear-gradient(135deg, #E8A317, #d49512); }
    .goal-bar-fill.at-risk { background: linear-gradient(135deg, var(--red), #c52a25); }
    .milestone-markers { position: absolute; top: 0; left: 0; right: 0; bottom: 0; z-index: 1; }
    .milestone-mark { position: absolute; top: -4px; bottom: -4px; width: 2px; background: var(--navy); opacity: 0.2; border-radius: 1px; }
    .milestone-label { position: absolute; top: 34px; font-size: 9px; font-weight: 600; color: var(--stone); transform: translateX(-50%); white-space: nowrap; }
    .milestone-label.hit { color: var(--blue); }
    .goal-detail { font-size: 12px; color: var(--charcoal); margin-top: 18px; }
    .goal-detail strong { color: var(--navy); }

    .vel-grid { display: flex; gap: 10px; flex-shrink: 0; }
    .vel-card { background: var(--gray-50); border-radius: var(--radius); padding: 14px 16px; min-width: 130px; border: 1px solid var(--gray-200); }
    .vel-card h3 { font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: var(--stone); margin-bottom: 8px; }
    .vel-row { font-size: 12px; color: var(--charcoal); margin-bottom: 3px; display: flex; justify-content: space-between; gap: 8px; }
    .vel-num { font-weight: 700; color: var(--navy); }
    .vel-trend { font-size: 10px; font-weight: 600; margin-top: 8px; padding: 2px 8px; border-radius: 20px; display: inline-block; }
    .vel-trend.up { background: rgba(118,206,225,0.15); color: #0a7b91; }
    .vel-trend.down { background: rgba(239,50,45,0.1); color: var(--red); }
    .vel-trend.flat { background: var(--gray-100); color: var(--stone); }

    /* === NAV === */
    .nav { background: var(--white); border-bottom: 1px solid var(--gray-200); padding: 0 32px; display: flex; }
    .nav-tab { padding: 14px 22px; font-size: 13px; font-weight: 500; color: var(--stone); cursor: pointer; border-bottom: 2.5px solid transparent; transition: all 0.15s; user-select: none; letter-spacing: -0.1px; }
    .nav-tab:hover { color: var(--navy); }
    .nav-tab.active { color: var(--red); border-bottom-color: var(--red); font-weight: 600; }

    /* === CONTENT === */
    .content { padding: 24px 32px 40px; }
    .view { display: none; }
    .view.active { display: block; }

    .demo-banner { background: var(--cream); border: 1px solid #f0d9a8; border-radius: var(--radius); padding: 10px 18px; margin-bottom: 16px; font-size: 11px; color: var(--maroon); font-weight: 500; }

    /* === TABLES === */
    .table-wrap { background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow-sm); border: 1px solid var(--gray-200); overflow: hidden; }
    .table-head { padding: 14px 20px; border-bottom: 1px solid var(--gray-200); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
    .table-head h2 { font-size: 14px; font-weight: 600; color: var(--navy); letter-spacing: -0.2px; }
    .filter-group { display: flex; gap: 5px; flex-wrap: wrap; }
    .filter-btn { padding: 5px 12px; font-size: 11px; font-weight: 500; border: 1px solid var(--gray-300); border-radius: 20px; background: var(--white); color: var(--charcoal); cursor: pointer; transition: all 0.15s; }
    .filter-btn:hover, .filter-btn.active { background: var(--navy); color: var(--white); border-color: var(--navy); }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 9px 14px; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.6px; color: var(--stone); background: var(--gray-50); border-bottom: 1px solid var(--gray-200); }
    td { padding: 11px 14px; font-size: 12.5px; border-bottom: 1px solid var(--gray-100); color: var(--charcoal); }
    tr:hover td { background: rgba(118,206,225,0.04); }

    /* === BADGES === */
    .status { display: inline-block; padding: 2px 9px; border-radius: 20px; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; }
    .status-active, .status-new { background: rgba(118,206,225,0.15); color: #0a7b91; }
    .status-sent { background: rgba(0,34,90,0.08); color: var(--navy); }
    .status-expired { background: var(--gray-100); color: var(--stone); }
    .status-unplaced { background: rgba(239,50,45,0.08); color: var(--red); }
    .status-pinged { background: rgba(118,206,225,0.15); color: #0a7b91; }
    .status-applied { background: rgba(75,0,0,0.08); color: var(--maroon); }
    .status-interviewing { background: rgba(232,163,23,0.12); color: #a37200; }
    .status-hired { background: rgba(45,156,60,0.1); color: #1a7a2b; }
    .cm-tag { display: inline-block; padding: 2px 7px; border-radius: 20px; font-size: 10px; background: var(--gray-100); color: var(--navy); margin: 1px; cursor: pointer; transition: background 0.1s; font-weight: 500; }
    .cm-tag:hover { background: var(--blue); color: var(--navy); }
    .link { color: var(--navy); text-decoration: none; font-weight: 500; }
    .link:hover { color: var(--red); text-decoration: underline; }

    /* === KANBAN === */
    .kanban-filters { display: flex; gap: 8px; margin-bottom: 14px; }
    .kanban-filters select { padding: 6px 12px; font-size: 11px; border: 1px solid var(--gray-300); border-radius: 20px; background: var(--white); color: var(--charcoal); font-family: 'Poppins', sans-serif; }
    .kanban-board { display: flex; gap: 10px; min-height: 400px; }
    .kanban-col { flex: 1; min-width: 165px; background: var(--gray-100); border-radius: var(--radius); display: flex; flex-direction: column; max-height: 68vh; }
    .kanban-col.drag-over { background: rgba(118,206,225,0.12); }
    .kcol-head { padding: 10px 12px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
    .kcol-head .cnt { background: var(--white); border-radius: 20px; padding: 1px 9px; font-size: 11px; font-weight: 700; }
    .col-unplaced .kcol-head { border-bottom: 3px solid var(--red); color: var(--red); }
    .col-pinged .kcol-head { border-bottom: 3px solid var(--blue); color: #0a7b91; }
    .col-applied .kcol-head { border-bottom: 3px solid var(--maroon); color: var(--maroon); }
    .col-interviewing .kcol-head { border-bottom: 3px solid #E8A317; color: #a37200; }
    .col-hired .kcol-head { border-bottom: 3px solid #2D9C3C; color: #1a7a2b; }
    .kcol-cards { padding: 6px; overflow-y: auto; flex: 1; }
    .kcard { background: var(--white); border-radius: 8px; padding: 10px 12px; margin-bottom: 6px; box-shadow: var(--shadow-sm); border: 1px solid var(--gray-200); cursor: grab; transition: all 0.15s; }
    .kcard:hover { box-shadow: var(--shadow-md); border-color: var(--blue); }
    .kcard.dragging { opacity: 0.4; }
    .kcard .kc-name { font-size: 12.5px; font-weight: 600; color: var(--navy); margin-bottom: 1px; }
    .kcard .kc-cert { font-size: 10px; color: var(--stone); }
    .kcard .kc-bottom { display: flex; justify-content: space-between; align-items: center; margin-top: 5px; gap: 4px; }
    .kcard .kc-district { font-size: 10px; color: var(--navy); font-weight: 500; }
    .kc-pill { font-size: 9px; padding: 1px 6px; border-radius: 20px; font-weight: 600; flex-shrink: 0; }
    .kc-pill.match { background: rgba(118,206,225,0.15); color: #0a7b91; }
    .kc-pill.nomatch { background: rgba(239,50,45,0.08); color: var(--red); }
    .kc-pill.noresume { background: rgba(232,163,23,0.12); color: #a37200; }
    .kcard .kc-activity { font-size: 10px; color: var(--stone); margin-top: 3px; }

    /* === DETAIL PANEL === */
    .detail-overlay { position: fixed; inset: 0; background: rgba(0,34,90,0.25); z-index: 199; display: none; backdrop-filter: blur(2px); }
    .detail-overlay.open { display: block; }
    .detail-panel { position: fixed; right: -440px; top: 0; width: 420px; height: 100vh; background: var(--white); box-shadow: -8px 0 32px rgba(0,34,90,0.15); z-index: 200; transition: right 0.3s cubic-bezier(0.4,0,0.2,1); overflow-y: auto; }
    .detail-panel.open { right: 0; }
    .detail-top { padding: 20px 24px; background: var(--navy); color: var(--cream); display: flex; justify-content: space-between; align-items: flex-start; }
    .detail-top h2 { font-size: 18px; font-weight: 700; }
    .detail-close { background: none; border: none; font-size: 28px; color: rgba(255,238,212,0.5); cursor: pointer; line-height: 1; }
    .detail-close:hover { color: var(--cream); }
    .detail-body { padding: 20px 24px; }
    .detail-section { margin-bottom: 22px; }
    .detail-section h3 { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: var(--stone); margin-bottom: 8px; }
    .detail-field { font-size: 12.5px; margin-bottom: 5px; color: var(--charcoal); }
    .detail-field .lbl { color: var(--stone); font-size: 10px; display: block; font-weight: 500; }
    .detail-field a { color: var(--navy); font-weight: 500; }
    .resume-btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 18px; background: var(--navy); color: var(--cream); border-radius: 20px; font-size: 11px; font-weight: 600; text-decoration: none; margin-top: 6px; transition: background 0.15s; }
    .resume-btn:hover { background: #0a3a7a; }
    .resume-missing { color: var(--red); font-size: 11px; font-weight: 600; margin-top: 6px; }
    .detail-status-select { padding: 6px 12px; font-size: 12px; border: 1px solid var(--gray-300); border-radius: 8px; background: var(--white); font-family: 'Poppins', sans-serif; margin-top: 6px; }
    .detail-timeline { list-style: none; }
    .detail-timeline li { padding: 6px 0; border-bottom: 1px solid var(--gray-100); font-size: 11.5px; display: flex; gap: 10px; }
    .detail-timeline .tl-date { color: var(--stone); flex-shrink: 0; width: 52px; font-weight: 500; }
    .detail-timeline .tl-action { font-weight: 600; flex-shrink: 0; width: 70px; color: var(--navy); }
    .detail-match-card { padding: 8px 12px; background: var(--gray-50); border-radius: 8px; margin-bottom: 6px; font-size: 12px; border: 1px solid var(--gray-200); }
    .detail-match-card a { color: var(--navy); font-weight: 600; }
    .detail-match-card .dm-meta { color: var(--stone); font-size: 10.5px; margin-top: 2px; }

    /* === DISTRICTS === */
    .district-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 14px; }
    .district-card { background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow-sm); border: 1px solid var(--gray-200); padding: 18px; border-left: 4px solid var(--gray-300); }
    .district-card.trend-active { border-left-color: var(--blue); }
    .district-card.trend-quiet { border-left-color: var(--stone); }
    .district-card h3 { font-size: 15px; font-weight: 700; color: var(--navy); margin-bottom: 2px; }
    .district-card .dc-sub { font-size: 10.5px; color: var(--stone); margin-bottom: 14px; font-weight: 500; }
    .district-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .district-stat { text-align: center; padding: 10px; border-radius: 8px; background: var(--gray-50); }
    .district-stat .ds-val { font-size: 22px; font-weight: 700; color: var(--navy); }
    .district-stat .ds-lbl { font-size: 9px; color: var(--stone); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }

    /* === FLAGS === */
    .flag-group { margin-bottom: 24px; }
    .flag-group-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--navy); margin-bottom: 10px; padding-bottom: 6px; border-bottom: 2px solid var(--gray-200); }
    .flag-card { background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow-sm); border: 1px solid var(--gray-200); padding: 13px 16px; margin-bottom: 8px; display: flex; align-items: flex-start; gap: 12px; }
    .flag-icon { width: 34px; height: 34px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; font-weight: 800; }
    .flag-icon.warn { background: rgba(232,163,23,0.12); color: #a37200; }
    .flag-icon.alert { background: rgba(239,50,45,0.08); color: var(--red); }
    .flag-icon.info { background: rgba(118,206,225,0.15); color: #0a7b91; }
    .flag-content h4 { font-size: 12.5px; font-weight: 600; color: var(--navy); margin-bottom: 1px; }
    .flag-content p { font-size: 11.5px; color: var(--charcoal); }
    .flag-action { display: inline-block; margin-top: 5px; padding: 3px 12px; font-size: 10px; font-weight: 600; background: var(--red); color: var(--white); border-radius: 20px; cursor: pointer; letter-spacing: 0.2px; }
    .empty-state { text-align: center; padding: 48px 20px; color: var(--stone); font-size: 12px; }

    /* === TOAST === */
    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--navy); color: var(--cream); padding: 12px 24px; border-radius: 10px; font-size: 12px; font-weight: 500; z-index: 300; box-shadow: var(--shadow-lg); transition: transform 0.3s cubic-bezier(0.4,0,0.2,1); pointer-events: none; }
    .toast.show { transform: translateX(-50%) translateY(0); }

    .footer { text-align: center; padding: 28px; font-size: 10px; color: var(--stone); border-top: 1px solid var(--gray-200); margin-top: 48px; letter-spacing: 0.3px; }

    @media (max-width: 900px) { .goal-tracker { flex-direction: column; } .kanban-board { overflow-x: auto; } .header { padding: 0 16px; } .content { padding: 16px; } }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-left">
      <img src="./tfa-logo.svg" alt="Teach For America" class="header-logo">
      <div class="header-divider"></div>
      <div>
        <div class="header-title">Placement Dashboard</div>
        <div class="header-subtitle">2026 Washington Corps</div>
      </div>
    </div>
    <div class="header-right">
      <span class="header-meta" id="syncTime"></span>
      <span id="dataBadge" class="data-badge demo">Demo</span>
    </div>
  </div>

  <div class="goal-tracker" id="goalTracker"></div>

  <div class="nav">
    <div class="nav-tab active" data-view="jobs">Job Board</div>
    <div class="nav-tab" data-view="corps">Corps Members</div>
    <div class="nav-tab" data-view="districts">Districts</div>
    <div class="nav-tab" data-view="flags">Flags</div>
  </div>

  <div class="content">
    <div class="view active" id="view-jobs">
      <div class="table-wrap">
        <div class="table-head"><h2>Certificated Teaching Positions</h2><div class="filter-group" id="districtFilter"></div></div>
        <table><thead><tr><th>Position</th><th>School</th><th>Cert / Grade</th><th>Matched CMs</th><th>Posted</th></tr></thead><tbody id="jobsBody"></tbody></table>
      </div>
    </div>
    <div class="view" id="view-corps">
      <div id="corpsBanner"></div>
      <div class="kanban-filters" id="kanbanFilters"></div>
      <div id="kanbanBoard" class="kanban-board"></div>
    </div>
    <div class="view" id="view-districts"><div id="distBanner"></div><div class="district-grid" id="districtGrid"></div></div>
    <div class="view" id="view-flags"><div id="flagsBanner"></div><div id="flagsList"></div></div>
  </div>

  <div class="detail-overlay" id="detailOverlay"></div>
  <div class="detail-panel" id="detailPanel">
    <div class="detail-top"><div><h2 id="detailName"></h2><div id="detailStatus" style="margin-top:6px"></div></div><button class="detail-close" id="detailClose">&times;</button></div>
    <div class="detail-body" id="detailBody"></div>
  </div>

  <div class="toast" id="toast"></div>

  <div class="footer">Teach For America Washington &middot; Placement Dashboard &middot; 2026 Corps</div>

<script type="module">
import { MOCK_ROSTER, MOCK_POSTINGS, MOCK_ACTIVITY, STATUS_ORDER } from './src/data.js';
import { SCRAPED_POSTINGS, SCRAPE_META, DISTRICTS } from './src/scraped-data.js';

const GOOGLE_SHEET_ID = '1zbv9hScvZIr4jLvi_jCwLEyQdc-QEDXSqTpDbDfLF4g';
// Apps Script web app URL — paste your deployment URL here
let APPS_SCRIPT_URL = '';
try { const cfg = await import('./config.js'); APPS_SCRIPT_URL = cfg.default.APPS_SCRIPT_URL; } catch(e) {}
const MILESTONES = [
  { label: 'Apr', date: '2026-04-30', target: 5 },
  { label: 'May', date: '2026-05-31', target: 15 },
  { label: 'Jun', date: '2026-06-30', target: 25 },
  { label: 'Jul', date: '2026-07-31', target: 40 },
  { label: 'Aug', date: '2026-08-31', target: 55 },
];
const FINAL_TARGET = 55;

// === SHEETS (Apps Script proxy for restricted sheets, CSV fallback for shared sheets) ===
async function fetchTab(tab) {
  if (APPS_SCRIPT_URL) {
    try { const r = await fetch(`${APPS_SCRIPT_URL}?tab=${encodeURIComponent(tab)}`); if (r.ok) { const j = await r.json(); if (j.rows && j.rows.length) return j.rows; } } catch(e) { console.warn('Apps Script fetch failed:', e); }
  }
  if (GOOGLE_SHEET_ID) {
    try { const r = await fetch(`https://docs.google.com/spreadsheets/d/${GOOGLE_SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(tab)}`); if (r.ok) { const d = csvParse(await r.text()); if (d && d.length && d[0]['Name']) return d; } } catch(e) {}
  }
  return null;
}
function csvParse(text) { const lines = text.split('\n').filter(l => l.trim()); if (lines.length < 2) return []; const h = csvLine(lines[0]); return lines.slice(1).map(l => { const v = csvLine(l); const o = {}; h.forEach((k,i) => o[k] = v[i]||''); return o; }).filter(r => Object.values(r).some(v => v)); }
function csvLine(l) { const r=[]; let c='',q=false; for(let i=0;i<l.length;i++){const ch=l[i]; if(ch==='"'){if(q&&l[i+1]==='"'){c+='"';i++}else q=!q} else if(ch===','&&!q){r.push(c.trim());c=''}else c+=ch} r.push(c.trim()); return r; }
async function loadRoster(){const d=await fetchTab('Corps Member Roster'); if(!d||!d.length)return null; return d.map(r=>({name:r['Name']||'',certAreas:(r['Cert Area(s)']||r['Cert Areas']||'').split(',').map(s=>s.trim()).filter(Boolean),gradeBand:r['Grade Band']||'',status:r['Status']||'Unplaced',districtTarget:r['Target District']||'',placedDistrict:r['Placed District']||'',placedSchool:r['Placed School']||'',email:r['Email']||'',phone:r['Phone']||'',resumeLink:r['Resume Link']||'',notes:r['Notes']||''})).filter(r=>r.name)}
async function loadActivity(){const d=await fetchTab('Activity Log'); if(!d||!d.length)return null; return d.map(r=>({date:r['Date']||'',cmName:r['CM Name']||'',action:r['Action']||'',jobReference:r['Job Reference']||''})).filter(r=>r.cmName)}

// === SHEET SYNC ===
async function syncStatus(name, newStatus) {
  if (!APPS_SCRIPT_URL) return;
  try {
    await fetch(APPS_SCRIPT_URL, { method: 'POST', body: JSON.stringify({ name, status: newStatus }), headers: { 'Content-Type': 'text/plain' } });
  } catch(e) { console.warn('Sheet sync failed:', e); }
}

// === HELPERS ===
function matchCMs(p,roster){return roster.filter(c=>c.status!=='Hired').filter(c=>{const cert=c.certAreas.some(a=>a===p.certArea||p.certArea==='General');const g=c.gradeBand===p.gradeLevel||p.gradeLevel==='Unknown';return cert&&g}).map(c=>c.name)}
function countMatches(cm,posts){return posts.filter(p=>{const cert=cm.certAreas.some(a=>a===p.certArea||p.certArea==='General');const g=cm.gradeBand===p.gradeLevel||p.gradeLevel==='Unknown';return cert&&g}).length}
function fmtDate(s){if(!s)return'—';const d=new Date(s);return isNaN(d)?s:d.toLocaleDateString('en-US',{month:'short',day:'numeric'})}
function cmEmail(n){const p=n.toLowerCase().split(' ');return p[0]+'.'+p[p.length-1]+'@corps.tfawashington.org'}
function cmPhone(n){const h=n.split('').reduce((a,c)=>a+c.charCodeAt(0),0);return'(206) 555-'+String(h%9000+1000)}
function hasResume(n){return n.split('').reduce((a,c)=>a+c.charCodeAt(0),0)%10>=3}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000)}

// === INIT ===
async function init(){
  const sheetRoster=await loadRoster(), sheetActivity=await loadActivity();
  const ROSTER=sheetRoster||MOCK_ROSTER, ACTIVITY=sheetActivity||MOCK_ACTIVITY;
  const isLive=!!sheetRoster;
  const POSTS=SCRAPED_POSTINGS&&SCRAPED_POSTINGS.length>0?SCRAPED_POSTINGS.map(p=>({...p,matchedCMs:matchCMs(p,ROSTER),status:p.status||'Active'})):MOCK_POSTINGS;

  const badge=document.getElementById('dataBadge');
  badge.className=isLive?'data-badge live':'data-badge demo';
  badge.textContent=isLive?`Live (${ROSTER.length})`:'Demo roster';
  if(SCRAPE_META){const d=new Date(SCRAPE_META.lastScrape);document.getElementById('syncTime').textContent=`${d.toLocaleDateString('en-US',{month:'short',day:'numeric'})} ${d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})} · ${SCRAPE_META.totalCertificated} positions`}

  const demo=isLive?'':'<div class="demo-banner">Demo data — connect a Google Sheet for your real roster.</div>';
  const now=new Date();
  const hired=ROSTER.filter(r=>r.status==='Hired').length;

  // Activity counts
  const jobsSent={},appliedCnt={},interviewCnt={};
  ACTIVITY.forEach(a=>{if(a.action==='Job Sent')jobsSent[a.cmName]=(jobsSent[a.cmName]||0)+1;if(a.action==='Applied')appliedCnt[a.cmName]=(appliedCnt[a.cmName]||0)+1;if(a.action==='Interview Scheduled')interviewCnt[a.cmName]=(interviewCnt[a.cmName]||0)+1});

  // === GOAL TRACKER ===
  const pct=Math.round((hired/FINAL_TARGET)*100);
  const currentMs=MILESTONES.find(m=>new Date(m.date)>=now)||MILESTONES[MILESTONES.length-1];
  const weeksLeft=Math.max(1,Math.ceil((new Date(MILESTONES[MILESTONES.length-1].date)-now)/(7*864e5)));
  const remaining=Math.max(0,FINAL_TARGET-hired);
  const paceNeeded=(remaining/weeksLeft).toFixed(1);
  const paceClass=hired>=currentMs.target?'on-pace':hired>=currentMs.target*0.7?'behind':'at-risk';

  const weekAgo=new Date(now-7*864e5),twoWeeksAgo=new Date(now-14*864e5);
  const tw=ACTIVITY.filter(a=>new Date(a.date)>=weekAgo),lw=ACTIVITY.filter(a=>{const d=new Date(a.date);return d>=twoWeeksAgo&&d<weekAgo});
  const twA=tw.filter(a=>a.action==='Applied').length,twI=tw.filter(a=>a.action==='Interview Scheduled').length,twH=tw.filter(a=>a.action==='Hired').length;
  const lwA=lw.filter(a=>a.action==='Applied').length,lwI=lw.filter(a=>a.action==='Interview Scheduled').length,lwH=lw.filter(a=>a.action==='Hired').length;
  const total=twA+twI+twH,ltotal=lwA+lwI+lwH;
  const trendLbl=total>ltotal?'Accelerating':total<ltotal?'Slowing':'Steady';
  const trendCls=total>ltotal?'up':total<ltotal?'down':'flat';
  function delta(a,b){return a>b?`<span style="color:#0a7b91">+${a-b}</span>`:a<b?`<span style="color:var(--red)">${a-b}</span>`:''}

  document.getElementById('goalTracker').innerHTML=`
    <div class="goal-main">
      <div class="goal-label">Placement Progress</div>
      <div class="goal-bar-outer">
        <div class="goal-bar-fill ${paceClass}" style="width:${Math.max(pct*(100/100),3)}%">${hired} placed</div>
        <div class="milestone-markers">${MILESTONES.map(m=>{const pos=(m.target/FINAL_TARGET)*100;const hit=hired>=m.target;return`<div class="milestone-mark" style="left:${pos}%"></div><div class="milestone-label${hit?' hit':''}" style="left:${pos}%">${m.label}: ${m.target}</div>`}).join('')}</div>
      </div>
      <div class="goal-detail"><strong>Next: ${currentMs.label} — ${currentMs.target} placed</strong> (need ${Math.max(0,currentMs.target-hired)} more) · ${weeksLeft} weeks remaining · pace needed: <strong>${paceNeeded}/week</strong></div>
    </div>
    <div class="vel-grid">
      <div class="vel-card"><h3>This Week</h3><div class="vel-row"><span>Applications</span><span class="vel-num">${twA}</span></div><div class="vel-row"><span>Interviews</span><span class="vel-num">${twI}</span></div><div class="vel-row"><span>Hires</span><span class="vel-num">${twH}</span></div></div>
      <div class="vel-card"><h3>vs Last Week</h3><div class="vel-row"><span>Applications</span><span class="vel-num">${lwA} ${delta(twA,lwA)}</span></div><div class="vel-row"><span>Interviews</span><span class="vel-num">${lwI} ${delta(twI,lwI)}</span></div><div class="vel-row"><span>Hires</span><span class="vel-num">${lwH} ${delta(twH,lwH)}</span></div><div class="vel-trend ${trendCls}">${trendLbl}</div></div>
    </div>`;

  // === NAV ===
  document.querySelectorAll('.nav-tab').forEach(tab=>tab.addEventListener('click',()=>{document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));tab.classList.add('active');document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));document.getElementById('view-'+tab.dataset.view).classList.add('active')}));

  // === JOB BOARD ===
  let distF='All';
  function renderDF(){const c=document.getElementById('districtFilter');c.innerHTML=['All',...DISTRICTS].map(d=>`<button class="filter-btn ${distF===d?'active':''}" data-d="${d}">${d}</button>`).join('');c.querySelectorAll('.filter-btn').forEach(b=>b.addEventListener('click',()=>{distF=b.dataset.d;renderDF();renderJobs()}))}
  function renderJobs(){const list=distF==='All'?POSTS:POSTS.filter(p=>p.district===distF);document.getElementById('jobsBody').innerHTML=list.map(p=>`<tr>
      <td>${p.link&&p.link!=='#'?`<a href="${p.link}" target="_blank" class="link">${p.positionTitle}</a>`:p.positionTitle}<br><span style="font-size:10px;color:var(--stone)">${p.district}</span></td>
      <td>${p.school||'—'}</td>
      <td><span class="status status-${p.certArea.toLowerCase().replace(/[^a-z]/g,'')}" style="font-size:10px">${p.certArea}</span><br><span style="font-size:10px;color:var(--stone)">${p.gradeLevel}</span></td>
      <td>${(p.matchedCMs||[]).length>0?p.matchedCMs.map(n=>`<span class="cm-tag" data-cm="${n}">${n}</span>`).join(''):'<span style="color:var(--stone);font-size:10px">—</span>'}</td>
      <td style="font-size:11px;color:var(--stone)">${fmtDate(p.datePosted||p.dateScraped)}</td>
    </tr>`).join('');document.querySelectorAll('#jobsBody .cm-tag[data-cm]').forEach(el=>el.addEventListener('click',()=>openDetail(el.dataset.cm)))}

  // === KANBAN ===
  document.getElementById('corpsBanner').innerHTML=demo;
  let kDist='All',kCert='All';
  const allCerts=[...new Set(ROSTER.flatMap(r=>r.certAreas))].sort();
  function renderKF(){document.getElementById('kanbanFilters').innerHTML=`<select id="kfD"><option value="All">All Districts</option>${DISTRICTS.map(d=>`<option ${kDist===d?'selected':''}>${d}</option>`).join('')}<option value="(none)">(No target)</option></select><select id="kfC"><option value="All">All Cert Areas</option>${allCerts.map(c=>`<option ${kCert===c?'selected':''}>${c}</option>`).join('')}</select>`;document.getElementById('kfD').addEventListener('change',e=>{kDist=e.target.value;renderK()});document.getElementById('kfC').addEventListener('change',e=>{kCert=e.target.value;renderK()})}

  function renderK(){
    let f=ROSTER.slice();
    if(kDist==='(none)')f=f.filter(r=>!r.districtTarget);else if(kDist!=='All')f=f.filter(r=>r.districtTarget===kDist);
    if(kCert!=='All')f=f.filter(r=>r.certAreas.includes(kCert));
    document.getElementById('kanbanBoard').innerHTML=STATUS_ORDER.map(status=>{
      const cms=f.filter(r=>r.status===status);
      return`<div class="kanban-col col-${status.toLowerCase()}" data-status="${status}"><div class="kcol-head">${status}<span class="cnt">${cms.length}</span></div><div class="kcol-cards">${cms.length===0?'<div style="text-align:center;color:var(--stone);font-size:10px;padding:16px">—</div>':cms.map(cm=>{const m=countMatches(cm,POSTS),sent=jobsSent[cm.name]||0,iv=interviewCnt[cm.name]||0,resume=isLive?!!cm.resumeLink:hasResume(cm.name);return`<div class="kcard" draggable="true" data-cm="${cm.name}"><div class="kc-name">${cm.name}</div><div class="kc-cert">${cm.certAreas.join(', ')} · ${cm.gradeBand}</div><div class="kc-bottom"><span class="kc-district">${cm.districtTarget?'&rarr; '+cm.districtTarget:''}</span>${status!=='Hired'?`<span class="kc-pill ${m>0?'match':'nomatch'}">${m} match${m!==1?'es':''}</span>`:''}</div>${!resume&&status!=='Hired'?'<span class="kc-pill noresume">No resume</span>':''}${sent>0||iv>0?`<div class="kc-activity">${sent} sent · ${appliedCnt[cm.name]||0} applied · ${iv} interview${iv!==1?'s':''}</div>`:''}</div>`}).join('')}</div></div>`}).join('');

    // Drag and drop
    document.querySelectorAll('.kcard[data-cm]').forEach(card=>{
      card.addEventListener('click',()=>openDetail(card.dataset.cm));
      card.addEventListener('dragstart',e=>{e.dataTransfer.setData('text/plain',card.dataset.cm);e.dataTransfer.effectAllowed='move';card.classList.add('dragging')});
      card.addEventListener('dragend',()=>card.classList.remove('dragging'));
    });
    document.querySelectorAll('.kanban-col').forEach(col=>{
      col.addEventListener('dragover',e=>{e.preventDefault();e.dataTransfer.dropEffect='move';col.classList.add('drag-over')});
      col.addEventListener('dragleave',()=>col.classList.remove('drag-over'));
      col.addEventListener('drop',e=>{e.preventDefault();col.classList.remove('drag-over');const name=e.dataTransfer.getData('text/plain');const newStatus=col.dataset.status;const cm=ROSTER.find(r=>r.name===name);if(cm&&cm.status!==newStatus){cm.status=newStatus;renderK();renderGoalAndVelocity();syncStatus(name,newStatus);showToast(`Moved ${name} → ${newStatus}`)}});
    });
  }

  function renderGoalAndVelocity(){const h=ROSTER.filter(r=>r.status==='Hired').length;const p=Math.round((h/FINAL_TARGET)*100);const pc=h>=currentMs.target?'on-pace':h>=currentMs.target*0.7?'behind':'at-risk';document.querySelector('.goal-bar-fill').className=`goal-bar-fill ${pc}`;document.querySelector('.goal-bar-fill').style.width=Math.max(p*(100/100),3)+'%';document.querySelector('.goal-bar-fill').textContent=h+' placed';document.querySelector('.goal-detail').innerHTML=`<strong>Next: ${currentMs.label} — ${currentMs.target} placed</strong> (need ${Math.max(0,currentMs.target-h)} more) · ${weeksLeft} weeks remaining · pace needed: <strong>${paceNeeded}/week</strong>`}

  // === DETAIL PANEL ===
  const overlay=document.getElementById('detailOverlay'),panel=document.getElementById('detailPanel');
  document.getElementById('detailClose').addEventListener('click',closeDetail);
  overlay.addEventListener('click',closeDetail);
  function closeDetail(){panel.classList.remove('open');overlay.classList.remove('open')}

  function openDetail(name){
    const cm=ROSTER.find(r=>r.name===name);if(!cm)return;
    panel.classList.add('open');overlay.classList.add('open');
    document.getElementById('detailName').textContent=cm.name;
    document.getElementById('detailStatus').innerHTML=`<span class="status status-${cm.status.toLowerCase()}">${cm.status}</span>`;
    const email=isLive?cm.email:cmEmail(cm.name),phone=isLive?cm.phone:cmPhone(cm.name),resume=isLive?cm.resumeLink:(hasResume(cm.name)?'#':'');
    const matches=POSTS.filter(p=>{const cert=cm.certAreas.some(a=>a===p.certArea||p.certArea==='General');const g=cm.gradeBand===p.gradeLevel||p.gradeLevel==='Unknown';return cert&&g});
    const history=ACTIVITY.filter(a=>a.cmName===cm.name).sort((a,b)=>new Date(b.date)-new Date(a.date));
    const iv=interviewCnt[cm.name]||0;

    document.getElementById('detailBody').innerHTML=`
      <div class="detail-section"><h3>Profile</h3>
        <div class="detail-field"><span class="lbl">Certification</span>${cm.certAreas.join(', ')}</div>
        <div class="detail-field"><span class="lbl">Grade Band</span>${cm.gradeBand}</div>
        <div class="detail-field"><span class="lbl">Target District</span>${cm.districtTarget||'Not set'}</div>
        ${cm.placedDistrict?`<div class="detail-field"><span class="lbl">Placed</span>${cm.placedSchool}, ${cm.placedDistrict}</div>`:''}
        ${iv>0?`<div class="detail-field"><span class="lbl">Interviews</span>${iv} interview${iv!==1?'s':''}</div>`:''}
        ${cm.notes?`<div class="detail-field"><span class="lbl">Notes</span>${cm.notes}</div>`:''}
      </div>
      <div class="detail-section"><h3>Move Status</h3>
        <select class="detail-status-select" id="detailStatusSel">${STATUS_ORDER.map(s=>`<option value="${s}" ${cm.status===s?'selected':''}>${s}</option>`).join('')}</select>
      </div>
      <div class="detail-section"><h3>Contact</h3>
        <div class="detail-field"><a href="mailto:${email}">${email}</a></div>
        <div class="detail-field"><a href="tel:${phone}">${phone}</a></div>
        ${resume?`<a class="resume-btn" href="${resume}" target="_blank">Download Resume</a>`:`<div class="resume-missing">No resume uploaded</div>`}
      </div>
      <div class="detail-section"><h3>Matching Positions (${matches.length})</h3>
        ${matches.length===0?'<div style="font-size:11px;color:var(--stone)">No current openings match.</div>':matches.map(p=>`<div class="detail-match-card">${p.link&&p.link!=='#'?`<a href="${p.link}" target="_blank">${p.positionTitle}</a>`:p.positionTitle}<div class="dm-meta">${p.district} · ${p.school||''} · ${p.certArea} · ${p.gradeLevel}</div></div>`).join('')}
      </div>
      <div class="detail-section"><h3>Activity (${history.length})</h3>
        ${history.length===0?'<div style="font-size:11px;color:var(--stone)">No activity yet.</div>':`<ul class="detail-timeline">${history.map(a=>`<li><span class="tl-date">${fmtDate(a.date)}</span><span class="tl-action">${a.action}</span><span>${a.jobReference}</span></li>`).join('')}</ul>`}
      </div>`;

    document.getElementById('detailStatusSel').addEventListener('change',e=>{const ns=e.target.value;if(cm.status!==ns){cm.status=ns;document.getElementById('detailStatus').innerHTML=`<span class="status status-${ns.toLowerCase()}">${ns}</span>`;renderK();renderGoalAndVelocity();syncStatus(cm.name,ns);showToast(`${cm.name} → ${ns}`)}});
  }

  // === DISTRICTS ===
  document.getElementById('distBanner').innerHTML=isLive?'':'<div class="demo-banner">Posting counts are real. CM data is demo.</div>';
  document.getElementById('districtGrid').innerHTML=DISTRICTS.map(d=>{
    const posts=POSTS.filter(p=>p.district===d&&p.status!=='Expired');const cms=ROSTER.filter(r=>r.districtTarget===d);
    const all=POSTS.filter(p=>p.district===d);const daysSince=all.length>0?Math.floor((now-new Date(all[0].dateScraped))/864e5):99;
    const trend=daysSince<=3?'active':'quiet';const county=['Tacoma','Franklin Pierce','Fife'].includes(d)?'Pierce County':'King County';
    return`<div class="district-card trend-${trend}"><h3>${d}</h3><div class="dc-sub">${county} · ${trend==='active'?'Actively posting':`Quiet (${daysSince}d)`}</div><div class="district-stats"><div class="district-stat"><div class="ds-val">${posts.length}</div><div class="ds-lbl">Open Posts</div></div><div class="district-stat"><div class="ds-val">${cms.filter(r=>r.status!=='Hired').length}</div><div class="ds-lbl">Targeting</div></div><div class="district-stat"><div class="ds-val">${cms.filter(r=>r.status==='Interviewing').length}</div><div class="ds-lbl">Interviewing</div></div><div class="district-stat"><div class="ds-val">${cms.filter(r=>r.status==='Hired').length}</div><div class="ds-lbl">Placed</div></div></div></div>`}).join('');

  // === FLAGS (grouped) ===
  document.getElementById('flagsBanner').innerHTML=isLive?'':'<div class="demo-banner">District flags use real data. CM flags are demo.</div>';
  const needsAction=[],atRisk=[],districtAlerts=[];

  ROSTER.forEach(r=>{if(r.status==='Hired')return;const resume=isLive?!!r.resumeLink:hasResume(r.name);if(!resume)needsAction.push({type:'warn',icon:'!',title:`${r.name} — no resume`,detail:'Cannot send to principals without resume on file.',action:'Request resume'})});
  ROSTER.forEach(r=>{if(r.status==='Hired')return;const sent=jobsSent[r.name]||0;if(sent>=2&&!appliedCnt[r.name])needsAction.push({type:'warn',icon:'!',title:`${r.name} — ${sent} jobs sent, 0 apps`,detail:r.certAreas.join(', ')+' · '+r.gradeBand,action:'Follow up'})});
  ROSTER.forEach(r=>{if(r.status!=='Unplaced')return;if(countMatches(r,POSTS)===0)needsAction.push({type:'warn',icon:'!',title:`${r.name} — no matching postings`,detail:`${r.certAreas.join(', ')} / ${r.gradeBand} — may need to broaden targets.`,action:'Review strategy'})});

  ROSTER.forEach(r=>{if(r.status!=='Applied')return;const a=ACTIVITY.find(x=>x.cmName===r.name&&x.action==='Applied');if(!a)return;const days=Math.floor((now-new Date(a.date))/864e5);if(days>=3)atRisk.push({type:'alert',icon:'!!',title:`${r.name} — applied ${days}d ago, no update`,detail:a.jobReference,action:'Call principal'})});
  ROSTER.forEach(r=>{if(r.status==='Hired')return;const iv=interviewCnt[r.name]||0;if(iv>=2)atRisk.push({type:'alert',icon:'!!',title:`${r.name} — ${iv} interviews, no offer yet`,detail:`${r.certAreas.join(', ')} · May need coaching or different targets.`,action:'Debrief with CM'})});
  ROSTER.forEach(r=>{const sent=jobsSent[r.name]||0;const iv=interviewCnt[r.name]||0;if(r.status==='Unplaced'&&sent>=3&&iv===0)atRisk.push({type:'alert',icon:'!',title:`${r.name} — no interviews after ${sent} jobs sent`,detail:'Applications may not be converting. Review materials.',action:'Resume review'})});

  DISTRICTS.forEach(d=>{const p=POSTS.filter(x=>x.district===d);if(p.length===0)districtAlerts.push({type:'info',icon:'?',title:`${d} — no teaching postings`,detail:'May be between hiring cycles.',action:'Check HR contact'});else{const days=Math.floor((now-new Date(p[0].dateScraped))/864e5);if(days>=5)districtAlerts.push({type:'info',icon:'?',title:`${d} — quiet for ${days} days`,detail:`Last posting: ${p[0].dateScraped}`,action:'Check with district'})}});

  function renderFlagGroup(title,flags){if(!flags.length)return'';return`<div class="flag-group"><div class="flag-group-title">${title} (${flags.length})</div>${flags.map(f=>`<div class="flag-card"><div class="flag-icon ${f.type}">${f.icon}</div><div class="flag-content"><h4>${f.title}</h4><p>${f.detail}</p><span class="flag-action">${f.action}</span></div></div>`).join('')}</div>`}
  const allFlags=needsAction.length+atRisk.length+districtAlerts.length;
  document.getElementById('flagsList').innerHTML=allFlags===0?'<div class="empty-state">No flags right now.</div>':(renderFlagGroup('Needs Action',needsAction)+renderFlagGroup('At Risk',atRisk)+renderFlagGroup('District Alerts',districtAlerts));

  // === RENDER ===
  renderDF();renderJobs();renderKF();renderK();
}
init();
</script>
</body>
</html>
